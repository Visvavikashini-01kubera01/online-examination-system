			<script>

			window.onload = function () {

			    const rollNumber = localStorage.getItem("rollNumber");
			    const examId = localStorage.getItem("currentExamId");

			    if (!rollNumber || !examId) {
			        document.getElementById("resultText").innerText = "No Result Found";
			        return;
			    }

			    fetch(`http://localhost:8081/results/${examId}`)
			        .then(res => res.json())
			        .then(results => {

			            let studentResult = results.find(r => 
			                r.rollNumber === rollNumber
			            );

			            if (studentResult) {

			                document.getElementById("resultText").innerText =
			                    "You have scored: " + studentResult.score;

			            } else {

			                document.getElementById("resultText").innerText =
			                    "Result not found";

			            }

			        })
			        .catch(err => {

			            console.error(err);
			            document.getElementById("resultText").innerText =
			                "Error loading result";

			        });

			};


			// disable back
			history.pushState(null, null, location.href);

			window.onpopstate = function () {
			    history.go(1);
			};

			function goDashboard() {
			    window.location.href = "student-dashboard.html";
			}

			</script>
			

			</body>
			</html>
