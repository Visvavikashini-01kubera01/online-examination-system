<!DOCTYPE html>
<html>
<head>
    <title>Change Password</title>

    <style>

        body {
            margin: 0;
            padding: 0;
			
			    font-family: Arial, sans-serif;
			    background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
			    color: white;
			

            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .container {
            background: white;
            padding: 40px;
            border-radius: 12px;
            width: 400px;
            text-align: center;
            box-shadow: 0 0 20px rgba(0,0,0,0.2);
        }

        h2 {
            margin-bottom: 20px;
            color: #4b0082;
        }

        input {
            width: 90%;
            padding: 12px;
            margin: 10px 0;
            border-radius: 6px;
            border: 1px solid #ccc;
            font-size: 14px;
        }

        button {
            padding: 12px 20px;
            background: #6a5acd;
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            margin-top: 15px;
            font-size: 15px;
        }

        button:hover {
            background: #4b0082;
        }

        #message {
            margin-top: 15px;
            font-weight: bold;
			color:green;
        }

    </style>
</head>

<body>

    <div class="container">

        <h2>Change Password</h2>

        <!-- Teacher -->
        <div id="teacherDiv" style="display:none;">
            <input type="text" id="teacherName" readonly>
        </div>

        <!-- Student -->
        <div id="studentDiv" style="display:none;">
            <input type="text" id="rollNumber" readonly>
        </div>

        <input type="password" id="oldPassword" placeholder="Old Password">

        <input type="password" id="newPassword" placeholder="New Password">

        <button onclick="changePassword()">Update Password</button>
		<button onclick="logout()">Logout</button>
        <p id="message"></p>
		<p>Password updated</p>
		
    </div>
	<script>
	function logout() {
	    localStorage.clear();
	    window.location.href = "login.html";
	}	
	</script>
	<script src="js/app.js"></script>
    <script src="/js/change-password.js"></script>

</body>
</html>
