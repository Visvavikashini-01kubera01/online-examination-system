<!DOCTYPE html>
<html>
<head>
    <title>Register</title>

    <style>

        body {
            margin: 0;
            padding: 0;
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #6a5acd, #4b0082);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .container {
            background: white;
            padding: 40px;
            border-radius: 12px;
            width: 400px;
            text-align: center;
            box-shadow: 0 0 20px rgba(0,0,0,0.2);
        }

        h2 {
            margin-bottom: 20px;
            color: #4b0082;
        }

        /* 🔥 INPUT + SELECT SAME STYLE */
        input, select {
            width: 95%;
            padding: 12px;
            margin: 10px 0;
            border-radius: 6px;
            border: 1px solid #ccc;
            font-size: 14px;
        }

        select {
            cursor: pointer;
        }

        button {
            width: 95%;
            padding: 12px;
            background: #6a5acd;
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            margin-top: 15px;
            font-size: 15px;
        }

        button:hover {
            background: #4b0082;
        }

        .note {
            margin-top: 15px;
            color: gray;
            font-size: 13px;
        }
		#message {
		    margin-top: 15px;
		    font-weight: bold;
		    font-size: 14px;
		}

    </style>
</head>

<body>

<div class="container">

    <h2>Registration FORM</h2>

    <form onsubmit="registerUser(event)">

        <input type="text" id="name" placeholder="Enter Username" required>

        <input type="password" id="password" placeholder="Enter Password" required>

        <select id="role" onchange="toggleRollInput()" required>
            <option value="">Select Role</option>
            <option value="student">Student</option>
            <option value="teacher">Teacher</option>
        </select>

        <!-- 🔥 Hidden initially -->
        <input type="text" id="rollNumber" placeholder="Enter Roll Number" style="display:none;">

        <button type="submit">Register</button>

    </form>

    <div class="note">
        Registration module ready 
    </div>
<div id="message"></div>
</div>

<script>

// 🔥 SHOW/HIDE ROLL NUMBER
function toggleRollInput() {

    const role = document.getElementById("role").value;
    const rollField = document.getElementById("rollNumber");

    if (role === "student") {
        rollField.style.display = "block";
    } else {
        rollField.style.display = "none";
        rollField.value = "";
    }
}

// 🔥 REGISTER FUNCTION
function registerUser(event) {

    event.preventDefault();

    const name = document.getElementById("name").value;
    const password = document.getElementById("password").value;
    const role = document.getElementById("role").value;
    const rollNumber = document.getElementById("rollNumber").value;

    // validation
    if (!name || !password || !role) {
        alert("Please fill all fields");
        return;
    }

    if (role === "student" && !rollNumber) {
        alert("Roll number required for student");
        return;
    }

    fetch("/user/register", {
        method: "POST",
        headers: {
            "Content-Type": "application/json"
        },
        body: JSON.stringify({
            name: name,
            password: password,
            role: role,
            rollNumber: role === "student" ? rollNumber : null
        })
    })
    .then(res => res.json())
    .then(data => {
		document.getElementById("message").style.color = "green";
		document.getElementById("message").innerText = " Registered Successfully!";
        window.location.href = "login.html";
    })
    .catch(err => {
        console.error(err);
		document.getElementById("message").style.color = "red";
		document.getElementById("message").innerText = "Registration failed!";
    });
}

</script>

</body>
</html>
