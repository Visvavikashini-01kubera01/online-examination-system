<!DOCTYPE html>
<html>

<head>
	
<title>Add Questions</title>

<!--<link rel="stylesheet" href="/css/style.css">-->
<style>
	body {
	    margin: 0;
	    padding: 0;
	    font-family: Arial;
	    background: linear-gradient(to right, #0f2027, #203a43, #2c5364);
	    color: white;
	}

	.container {
	    width: 80%;
	    margin: auto;
	    margin-top: 40px;
	    padding: 20px;
	    text-align: center;
	}

	.top-section {
	    display: flex;
	    justify-content: center;
	    gap: 10px;
	    margin-bottom: 20px;
	}

	input {
	    padding: 10px;
	    border-radius: 6px;
	    border: none;
	    width: 200px;
	}

	button {
	    padding: 10px 20px;
	    background: #4da6ff;
	    border: none;
	    border-radius: 8px;
	    color: white;
	    cursor: pointer;
	}

	button:hover {
	    background: #3399ff;
	}

	#questionsContainer {
	    margin-top: 20px;
	}

	.question-box {
	    background: rgba(255,255,255,0.1);
	    padding: 20px;
	    margin: 20px auto;
	    width: 60%;
	    border-radius: 10px;
	    border: 1px solid #00ffff;
	    display: flex;
	    flex-direction: column;
	    gap: 10px;
	}

	.question-box textarea {
	    width: 100%;
	    height: 60px;
	    padding: 10px;
	    border-radius: 6px;
	}

	.question-box input {
	    width: 100%;
	    padding: 10px;
	    border-radius: 6px;
	}
	.submit-btn {
	    margin-top: 20px;
	}
</style>

</head>

<body>

	<div class="container">

<h2>Add Questions</h2>
<div class="top-section">

<input type="number" id="examId" readonly>

<input type="number" id="questionCount" placeholder="Number of Questions">

<button onclick="generateQuestions()">Generate Questions</button>
</div>

<div id="questionsContainer"></div>

<button onclick="submitQuestions()">Submit Questions</button>
</div>


<p id="message"></p>
<script src="/js/teacher.js"></script>

	
</script>
<script>
window.onload = function() {

    let examId = localStorage.getItem("createdExamId");

    if (examId) {
        document.getElementById("examId").value = examId;
    }

};
</script>
</body>

</html>
